<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Scavenger Hunt</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/picocss@1/pico.min.css">
</head>
<body style="padding:40px; background-color: #1a0933; color: white;">
    <main style="max-width: 450px; margin: auto;">
        <h2>Join the Hunt! 🗺️</h2>
        <p>Enter your team name or individual moniker to begin scanning codes.</p>
        <form method="POST">
            <input type="text" name="username" placeholder="e.g. Cyber_Hunters" required>
            <button type="submit" style="background-color: #ff007f; border: none;">Start Game</button>
        </form>
    </main>
</body>
</html>
